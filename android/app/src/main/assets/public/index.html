<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Tata Surya</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    .arjs-loader {
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .arjs-loader div {
      text-align: center;
      font-size: 1.25em;
      color: white;
    }
  </style>
</head>
<body>

  <a-scene
  embedded
  vr-mode-ui="enabled: false"
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3; patternRatio: 0.9;">

    <!-- ============ LIGHTING ============ -->
    <a-entity light="type: ambient; color: #ffffff; intensity: 1.2"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 0.8" position="1 1 1"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 0.4" position="-1 1 -1"></a-entity>

    <!-- ============ MATAHARI ============ -->
    <a-marker type="pattern" url="assets/markers/pattern-00_matahari_scaled.patt">
      <a-entity
        gltf-model="assets/models/SO_Matahari.glb"
        scale="5 5 5"
        position="0 1 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
      </a-entity>
    </a-marker>

    <!-- ============ MERKURIUS ============ -->
    <a-marker type="pattern" url="assets/markers/pattern-01_merkurius_scaled.patt">
      <a-entity
        gltf-model="assets/models/SO_Merkurius.glb"
        scale="5 5 5"
        position="0 1 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
      </a-entity>
    </a-marker>

    <!-- ============ VENUS ============ -->
    <a-marker type="pattern" url="assets/markers/pattern-02_venus_scaled.patt">
      <a-entity
        gltf-model="assets/models/SO_Venus.glb"
        scale="5 5 5"
        position="0 1 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
      </a-entity>
    </a-marker>

    <!-- ============ BUMI ============ -->
    <a-marker type="pattern" url="assets/markers/pattern-03_bumi_scaled.patt">
      <a-entity
        gltf-model="assets/models/SO_Bumi.glb"
        scale="5 5 5"
        position="0 1 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
      </a-entity>
    </a-marker>

    <!-- ============ BULAN ============ -->
    <a-marker type="pattern" url="assets/markers/pattern-03-5_bulan_scaled.patt">
      <a-entity
        gltf-model="assets/models/SO_Bulan.glb"
        scale="5 5 5"
        position="0 1 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
      </a-entity>
    </a-marker>

    <!-- ============ MARS ============ -->
    <a-marker type="pattern" url="assets/markers/pattern-04_mars_scaled.patt">
      <a-entity
        gltf-model="assets/models/SO_Mars.glb"
        scale="5 5 5"
        position="0 1 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 13000; easing: linear">
      </a-entity>
    </a-marker>

    <!-- ============ JUPITER ============ -->
    <a-marker type="pattern" url="assets/markers/pattern-05_jupiter_scaled.patt">
      <a-entity
        gltf-model="assets/models/SO_Jupiter.glb"
        scale="5 5 5"
        position="0 1 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear">
      </a-entity>
    </a-marker>

    <!-- ============ SATURNUS ============ -->
    <a-marker type="pattern" url="assets/markers/pattern-06_saturnus_scaled.patt">
      <a-entity
        gltf-model="assets/models/SO_Saturnus.glb"
        scale="5 5 5"
        position="0 1 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 9500; easing: linear">
      </a-entity>
    </a-marker>

    <!-- ============ URANUS ============ -->
    <a-marker type="pattern" url="assets/markers/pattern-07_uranus_scaled.patt">
      <a-entity
        gltf-model="assets/models/SO_Uranus.glb"
        scale="5 5 5"
        position="0 1 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 11000; easing: linear">
      </a-entity>
    </a-marker>

    <!-- ============ NEPTUNUS ============ -->
    <a-marker type="pattern" url="assets/markers/pattern-08_neptunus_scaled.patt">
      <a-entity
        gltf-model="assets/models/SO_Neptunus.glb"
        scale="5 5 5"
        position="0 1 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 11500; easing: linear">
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
